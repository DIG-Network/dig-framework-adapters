name: publish-npm

# Build + publish both packages to npmjs:
#   @dignetwork/vite-plugin-dig  +  @dignetwork/next-plugin-dig
# Deploy = build + package + publish ONLY (CLAUDE.md #489/#488): the PR release gates (ci.yml)
# already ran typecheck/build/the full test suite + coverage against this exact merged tree —
# re-running the test suite here is redundant AND a pure flake-exposure surface that can block an
# already-green-tested release on a tag-path re-run (the #488 class of failure). Keep typecheck
# here since it is a fast, deterministic compile-time check (not a flaky-test surface) and gates
# the build tsup relies on.
# Auth uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. npm exchanges this workflow's
# GitHub Actions OIDC token for a short-lived publish token automatically; the npm-side trusted
# publisher must be configured for org DIG-Network, repo dig-framework-adapters, workflow
# publish-npm.yml. Runs when a GitHub Release is published (tag-driven), or on manual dispatch.
# The versions published are whatever is in each package's package.json on the released commit —
# bump them before tagging.
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build + npm publish (both packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Gate the publish on a green typecheck + build (run with the npm bundled by setup-node —
      # upgrading npm globally before this point has been observed to break the workspace
      # scripts' nested `npm run` invocations on Node 22 runners). The full test suite is NOT
      # re-run here — the PR's ci.yml gate already tested this exact merged tree (#489).
      - run: npm run typecheck
      - run: npm run build
      # Trusted publishing requires npm CLI >= 11.5.1; Node 22 bundles npm 10. Upgrade right
      # before publish, after typecheck+build have already run cleanly.
      - run: npm install -g npm@latest
      - run: npm --version
      # Publish every workspace package (the root is private:true and is skipped).
      # OIDC trusted publishing is auto-detected; provenance is attached automatically.
      - name: publish to npmjs
        run: npm publish --workspaces --access public
