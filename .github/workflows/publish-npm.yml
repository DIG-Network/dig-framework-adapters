name: publish-npm

# Build + test both packages and publish them to npmjs:
#   @dignetwork/vite-plugin-dig  +  @dignetwork/next-plugin-dig
# Auth uses the org-level NPM_TOKEN secret (must be granted to this repo in the org secret's
# repository-access list) — the SAME pattern as dig-sdk's / chip35_dl_coin's publish-npm.yml. Runs
# when a GitHub Release is published (tag-driven), or on manual dispatch. The versions published are
# whatever is in each package's package.json on the released commit — bump them before tagging.
on:
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: build + test + npm publish (both packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Gate the publish on a green build + tests.
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # Publish every workspace package (the root is private:true and is skipped).
      - name: publish to npmjs
        run: npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
